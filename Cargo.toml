[package]
name = "av-contrib"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Contributor-side byte and media access-unit helpers for av-mesh"
repository = "https://github.com/wavey-ai/av-contrib"
readme = "README.md"

[dependencies]
access-unit = { path = "../access-unit" }
anyhow = "1.0"
async-trait = "0.1"
bytes = "1.9"
clap = { version = "4.5", features = ["derive"] }
form_urlencoded = "1.2"
futures-util = "0.3"
http = "1"
raptorq-datagram-fec = { path = "../raptor-fec/crates/raptorq-datagram-fec" }
rist-core-pure = { package = "rist-core", git = "https://github.com/wavey-ai/rist-rs.git", branch = "pure-rust" }
rist-mio-pure = { package = "rist-mio", git = "https://github.com/wavey-ai/rist-rs.git", branch = "pure-rust" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.45", features = ["io-std", "io-util", "macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
web-service = { path = "../web-services/web-service" }

[patch."https://github.com/wavey-ai/playlists.git"]
playlists = { path = "../playlists" }
