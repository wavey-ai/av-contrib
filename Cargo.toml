[package]
name = "av-contrib"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Contributor-side byte and media access-unit helpers for av-mesh"
repository = "https://github.com/wavey-ai/av-contrib"
readme = "README.md"

[dependencies]
access-unit = { git = "https://github.com/wavey-ai/access-unit.git" }
anyhow = "1.0"
async-trait = "0.1"
boxer = { git = "https://github.com/wavey-ai/boxer.git" }
bytes = "1.9"
clap = { version = "4.5", features = ["derive", "env"] }
form_urlencoded = "1.2"
futures-util = "0.3"
h264 = { git = "https://github.com/wavey-ai/av-rs.git" }
hls = { git = "https://github.com/wavey-ai/web-services.git" }
http = "1"
mpeg2ts-reader = { git = "https://github.com/wavey-ai/mpeg2ts-reader.git" }
playlists = { git = "https://github.com/wavey-ai/playlists.git" }
raptorq-datagram-fec = { git = "https://github.com/wavey-ai/raptor-fec.git" }
raptorq-fec-transport = { git = "https://github.com/wavey-ai/raptor-fec.git" }
rist-core-pure = { package = "rist-core", git = "https://github.com/wavey-ai/rist-rs.git" }
rist-mio-pure = { package = "rist-mio", git = "https://github.com/wavey-ai/rist-rs.git" }
rtmp-ingress = { git = "https://github.com/wavey-ai/rtmp-ingress.git" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.45", features = ["io-std", "io-util", "macros", "net", "process", "rt-multi-thread", "signal", "sync", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
upload-response = { git = "https://github.com/wavey-ai/web-services.git", default-features = false, features = ["srt", "rist", "rist-pure"] }
web-service = { git = "https://github.com/wavey-ai/web-services.git" }
